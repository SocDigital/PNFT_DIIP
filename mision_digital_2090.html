<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misión Digital 2090 · Academia de Agentes Digitales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05060d;
    --panel:#0e1224;
    --panel-alt:#131a30;
    --line: rgba(57,255,169,0.18);
    --blue:#2e6bff;
    --cyan:#29f1ff;
    --violet:#b14eff;
    --green:#39ff8f;
    --danger:#ff3860;
    --gold:#ffd166;
    --text:#e9f2ff;
    --text-dim:#7c8fb8;
    --font-display:'Orbitron', sans-serif;
    --font-body:'Rajdhani', sans-serif;
    --font-mono:'Share Tech Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(ellipse at 15% -10%, rgba(177,78,255,0.22), transparent 55%),
      radial-gradient(ellipse at 90% 0%, rgba(41,241,255,0.16), transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(57,255,143,0.08), transparent 60%),
      var(--bg);
    color:var(--text); font-family:var(--font-body);
    overflow-x:hidden; position:relative;
  }
  body::before{
    content:""; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(41,241,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,241,255,0.05) 1px, transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
    mask-image:radial-gradient(ellipse at 50% 15%, black 5%, transparent 72%);
  }
  body::after{
    content:""; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    pointer-events:none; z-index:1; opacity:.5;
  }
  #app{position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:16px 16px 46px;}

  /* corner brackets — hologram HUD feel */
  .bracketed{position:relative;}
  .bracketed::before, .bracketed::after,
  .bracketed .bl, .bracketed .br{
    content:""; position:absolute; width:18px; height:18px; pointer-events:none;
  }
  .bracketed::before{top:-2px; left:-2px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); border-top-left-radius:6px;}
  .bracketed::after{top:-2px; right:-2px; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); border-top-right-radius:6px;}
  .bracketed .bl{bottom:-2px; left:-2px; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); border-bottom-left-radius:6px;}
  .bracketed .br{bottom:-2px; right:-2px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); border-bottom-right-radius:6px;}

  /* ---------- HUD TOP BAR ---------- */
  .hud-bar{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:linear-gradient(180deg, rgba(19,26,48,0.92), rgba(14,18,36,0.8));
    border:1px solid var(--line); border-radius:14px; padding:12px 18px;
    backdrop-filter:blur(6px); box-shadow:0 0 24px rgba(41,241,255,0.06) inset;
  }
  .hud-brand{font-family:var(--font-display); font-size:13px; letter-spacing:2px; color:var(--cyan); white-space:nowrap;}
  .hud-brand span{color:var(--violet);}
  .hud-mid{flex:1; min-width:140px;}
  .hud-level-label{
    font-family:var(--font-mono); font-size:12px; color:var(--text-dim);
    margin-bottom:5px; letter-spacing:1px; display:flex; justify-content:space-between; gap:8px;
  }
  .progress-track{position:relative; height:11px; border-radius:6px; background:rgba(255,255,255,0.06); border:1px solid rgba(41,241,255,0.25); overflow:hidden;}
  .progress-fill{position:absolute; inset:0 auto 0 0; width:0%; background:linear-gradient(90deg, var(--violet), var(--cyan), var(--green)); box-shadow:0 0 14px var(--cyan); transition:width .6s cubic-bezier(.4,1.4,.4,1); border-radius:6px;}
  .progress-track .tick{position:absolute; top:0; bottom:0; width:2px; background:rgba(5,6,13,0.9);}

  .hud-stats{display:flex; align-items:center; gap:16px; font-family:var(--font-mono); font-size:14px;}
  .lives{letter-spacing:3px; font-size:16px;}
  .xp-count{color:var(--gold); white-space:nowrap;}
  .xp-count b{font-family:var(--font-display); font-size:14px;}

  .badge-tray{display:flex; gap:8px;}
  .badge-slot{
    width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:15px; border:2px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.03);
    color:var(--text-dim); transition:all .4s ease;
  }
  .badge-slot.unlocked{border-color:var(--gold); color:var(--gold); background:radial-gradient(circle, rgba(255,209,102,0.28), transparent 70%); box-shadow:0 0 14px rgba(255,209,102,0.55); animation:badgePop .5s ease;}
  @keyframes badgePop{0%{transform:scale(0.3) rotate(-25deg); opacity:0;}60%{transform:scale(1.2) rotate(8deg);}100%{transform:scale(1) rotate(0);}}

  /* ---------- STAGE ---------- */
  .stage{display:grid; grid-template-columns:270px 1fr; gap:18px; margin-top:18px; align-items:start;}
  @media (max-width:820px){ .stage{grid-template-columns:1fr;} }

  .robot-panel{
    background:linear-gradient(180deg, rgba(19,26,48,0.88), rgba(9,12,24,0.88));
    border:1px solid var(--line); border-radius:16px; padding:18px; text-align:center; position:sticky; top:16px;
  }
  @media (max-width:820px){ .robot-panel{position:static;} }
  .robot-name{font-family:var(--font-display); font-size:12px; letter-spacing:3px; color:var(--violet); margin-bottom:8px;}
  .robot-svg{width:120px; height:120px; filter:drop-shadow(0 0 18px rgba(41,241,255,0.35));}
  .eye{fill:var(--cyan); transform-origin:center; animation:blink 4.2s infinite;}
  .eye.right{animation-delay:.15s;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);} 95%{transform:scaleY(0.1);}}
  .robot--happy .eye{fill:var(--green);}
  .robot--sad .eye{fill:var(--danger);}
  .robot--excited .eye{fill:var(--gold);}
  .robot-antenna-tip{fill:var(--cyan); animation:pulseTip 1.6s infinite;}
  @keyframes pulseTip{0%,100%{opacity:1;}50%{opacity:.35;}}
  .speech-bubble{margin-top:14px; background:var(--panel-alt); border:1px solid var(--line); border-radius:12px; padding:12px 14px; font-size:15px; line-height:1.4; color:var(--text); min-height:70px; display:flex; align-items:center; justify-content:center;}
  .robot-caption{margin-top:10px; font-family:var(--font-mono); font-size:11px; color:var(--text-dim);}

  .main-panel{
    background:linear-gradient(180deg, rgba(19,26,48,0.88), rgba(9,12,24,0.88));
    border:1px solid var(--line); border-radius:16px; padding:26px 26px 30px;
    position:relative; min-height:430px; display:flex; flex-direction:column; justify-content:center;
  }
  .main-panel.boss-mode{border-color:rgba(255,56,96,0.6); box-shadow:0 0 34px rgba(255,56,96,0.25) inset;}
  .main-panel::before{
    content:""; position:absolute; inset:0; border-radius:16px; padding:1px;
    background:linear-gradient(120deg, rgba(41,241,255,0.5), transparent 30%, transparent 70%, rgba(177,78,255,0.5));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none;
  }

  .screen{animation:fadeSlide .45s ease;}
  @keyframes fadeSlide{from{opacity:0; transform:translateY(10px);}to{opacity:1; transform:translateY(0);}}

  .eyebrow{font-family:var(--font-mono); font-size:12px; letter-spacing:3px; color:var(--cyan); text-transform:uppercase; margin-bottom:10px;}
  h1.title{font-family:var(--font-display); font-size:clamp(21px,4vw,32px); margin:0 0 14px; line-height:1.18; color:var(--text);}
  h1.title span{color:var(--cyan);}
  .lead{font-size:16px; color:var(--text-dim); line-height:1.6; max-width:660px;}

  .field-label{font-family:var(--font-mono); font-size:12px; color:var(--text-dim); letter-spacing:1px; margin:20px 0 8px;}
  input[type=text]{width:100%; max-width:360px; background:rgba(255,255,255,0.04); border:1px solid var(--line); border-radius:10px; padding:12px 14px; color:var(--text); font-family:var(--font-body); font-size:17px;}
  input[type=text]:focus{outline:2px solid var(--cyan); outline-offset:2px;}

  .btn{
    font-family:var(--font-display); font-size:12.5px; letter-spacing:1.4px; color:#04070f;
    background:linear-gradient(90deg, var(--cyan), var(--violet)); border:none; border-radius:10px;
    padding:14px 24px; cursor:pointer; margin-top:22px; box-shadow:0 0 20px rgba(41,241,255,0.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-2px); box-shadow:0 4px 26px rgba(41,241,255,0.55);}
  .btn:focus-visible{outline:3px solid #fff; outline-offset:2px;}
  .btn.secondary{background:transparent; color:var(--cyan); border:1px solid var(--cyan); box-shadow:none;}
  .btn.danger{background:linear-gradient(90deg, #ff3860, #b14eff); box-shadow:0 0 20px rgba(255,56,96,0.4);}

  .q-meta{display:flex; justify-content:space-between; align-items:baseline; font-family:var(--font-mono); font-size:12px; color:var(--text-dim); margin-bottom:14px; letter-spacing:1px; flex-wrap:wrap; gap:6px;}
  .q-meta .zone-tag{color:var(--violet);}
  .boss-tag{color:var(--danger); font-weight:700;}
  .q-text{font-size:clamp(18px,2.5vw,24px); font-weight:600; margin-bottom:20px; line-height:1.4;}
  .def-panel{background:rgba(255,255,255,0.035); border-left:3px solid var(--cyan); border-radius:8px; padding:14px 16px; font-size:18px; font-style:italic; margin-bottom:8px;}
  .arrow-down{text-align:center; color:var(--cyan); font-size:20px; margin:6px 0 16px;}
  .icon-showcase{text-align:center; margin-bottom:10px;}
  .icon-big{font-size:64px; line-height:1; filter:drop-shadow(0 0 16px rgba(41,241,255,0.4));}
  .icon-caption{color:var(--text-dim); font-size:15px; margin-top:6px;}

  .options{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:560px){ .options{grid-template-columns:1fr;} }
  .opt{
    text-align:left; background:rgba(255,255,255,0.035); border:1px solid rgba(255,255,255,0.14); border-radius:12px;
    padding:14px 16px; color:var(--text); font-family:var(--font-body); font-size:16px; font-weight:600;
    cursor:pointer; display:flex; gap:10px; align-items:flex-start; transition:all .15s ease;
  }
  .opt .letter{font-family:var(--font-mono); color:var(--cyan); border:1px solid rgba(41,241,255,0.4); border-radius:6px; width:26px; height:26px; flex:0 0 26px; display:flex; align-items:center; justify-content:center; font-size:13px;}
  .opt .chip-mark{flex:0 0 auto; font-size:16px;}
  .opt:hover:not(:disabled){border-color:var(--cyan); background:rgba(41,241,255,0.07);}
  .opt:focus-visible{outline:3px solid var(--cyan); outline-offset:2px;}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--green); background:rgba(57,255,143,0.12); box-shadow:0 0 18px rgba(57,255,143,0.25);}
  .opt.correct .letter{border-color:var(--green); color:var(--green);}
  .opt.wrong{border-color:var(--danger); background:rgba(255,56,96,0.12);}
  .opt.wrong .letter{border-color:var(--danger); color:var(--danger);}
  .opt.dim{opacity:.45;}

  .feedback{margin-top:18px; padding:14px 16px; border-radius:10px; font-size:15px; line-height:1.5; border:1px solid var(--line); background:var(--panel-alt); display:none;}
  .feedback.show{display:block; animation:fadeSlide .35s ease;}
  .feedback.ok{border-color:var(--green);}
  .feedback.bad{border-color:var(--danger);}
  .nextwrap{display:flex; justify-content:flex-end;}

  .badge-big{width:116px; height:116px; margin:8px auto 6px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:46px; background:radial-gradient(circle, rgba(255,209,102,0.28), transparent 70%); border:2px solid var(--gold); box-shadow:0 0 40px rgba(255,209,102,0.5); animation:badgePop .6s ease;}
  .score-line{font-family:var(--font-mono); font-size:15px; color:var(--text-dim); margin-top:6px;}
  .score-line b{color:var(--cyan);}

  /* SHADOW alert / boss screens */
  .alert-panel{text-align:center;}
  .alert-icon{font-size:52px;}
  .alert-title{font-family:var(--font-display); color:var(--danger); font-size:22px; letter-spacing:2px; margin:8px 0; animation:flicker 1.4s infinite;}
  @keyframes flicker{0%,100%{opacity:1;} 45%{opacity:.75;} 50%{opacity:1;} 72%{opacity:.6;} 78%{opacity:1;}}
  .shadow-face{
    width:150px; height:150px; margin:6px auto 12px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,56,96,0.45), rgba(5,6,13,0.9) 70%);
    border:2px solid var(--danger); box-shadow:0 0 50px rgba(255,56,96,0.5);
    display:flex; align-items:center; justify-content:center; font-size:64px;
  }

  /* no-lives screen */
  .heartbreak{font-size:48px;}

  /* Certificate */
  .diploma{border:2px solid var(--gold); border-radius:16px; padding:32px 28px; text-align:center; background: radial-gradient(ellipse at 50% 0%, rgba(255,209,102,0.14), transparent 60%), var(--panel-alt); position:relative;}
  .diploma-seal{font-size:38px;}
  .diploma h2{font-family:var(--font-display); color:var(--gold); font-size:clamp(18px,3vw,24px); margin:8px 0 2px; letter-spacing:2px;}
  .diploma .agency{color:var(--text-dim); font-size:13px; font-family:var(--font-mono); letter-spacing:1px;}
  .diploma .agent-name{font-family:var(--font-display); font-size:clamp(24px,4vw,34px); color:var(--cyan); margin:14px 0;}
  .diploma .rank{font-family:var(--font-display); color:var(--green); font-size:clamp(18px,2.6vw,24px); letter-spacing:2px; margin-top:8px;}
  .diploma .sub{color:var(--text-dim); font-size:14px; margin-top:4px;}
  .zone-report{margin-top:22px; display:grid; gap:10px; text-align:left;}
  .zone-row{display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-family:var(--font-mono); font-size:13px; flex-wrap:wrap; gap:6px;}
  .zone-row .bar-mini{flex:1; min-width:60px; height:8px; margin:0 12px; background:rgba(255,255,255,0.08); border-radius:5px; overflow:hidden;}
  .zone-row .bar-mini > div{height:100%; background:linear-gradient(90deg,var(--violet),var(--cyan));}
  .xp-total{font-family:var(--font-display); font-size:26px; color:var(--gold); margin-top:18px;}
  textarea.report-copy{width:100%; margin-top:16px; min-height:110px; background:rgba(255,255,255,0.04); color:var(--text-dim); border:1px solid var(--line); border-radius:10px; padding:10px; font-family:var(--font-mono); font-size:12px;}
  .btnrow{display:flex; gap:12px; flex-wrap:wrap; justify-content:center;}

  /* easter egg toast */
  #eggToast{
    position:fixed; left:50%; bottom:26px; transform:translate(-50%, 140%);
    background:linear-gradient(90deg, rgba(255,209,102,0.18), rgba(41,241,255,0.14));
    border:1px solid var(--gold); border-radius:12px; padding:14px 20px; z-index:50;
    font-family:var(--font-mono); font-size:14px; color:var(--gold); text-align:center;
    box-shadow:0 0 30px rgba(255,209,102,0.4); transition:transform .5s cubic-bezier(.4,1.6,.4,1);
    max-width:88vw;
  }
  #eggToast.show{transform:translate(-50%, 0);}

  .sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;} }
</style>
</head>
<body>
<div id="app">

  <div class="hud-bar bracketed">
    <span class="bl"></span><span class="br"></span>
    <div class="hud-brand">AISD // <span>MISIÓN DIGITAL 2090</span></div>
    <div class="hud-mid">
      <div class="hud-level-label"><span id="hudLevelName">ACADEMIA — EN ESPERA</span><span id="hudProgressText">0 / 30</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="hud-stats">
      <span class="lives" id="livesDisplay">❤️❤️❤️</span>
      <span class="xp-count">XP <b id="xpDisplay">0</b></span>
    </div>
    <div class="badge-tray" id="badgeTray" aria-label="Insignias obtenidas">
      <div class="badge-slot" id="badge-0" title="Misión 1">🛜</div>
      <div class="badge-slot" id="badge-1" title="Misión 2">🤖</div>
      <div class="badge-slot" id="badge-2" title="Misión 3">🛡</div>
    </div>
  </div>

  <div class="stage">
    <div class="robot-panel bracketed">
      <span class="bl"></span><span class="br"></span>
      <div class="robot-name">IA-9 · UNIDAD GUÍA</div>
      <svg class="robot-svg" id="robotSvg" viewBox="0 0 120 120">
        <rect x="30" y="10" width="6" height="18" fill="#3a4a6b"/>
        <circle class="robot-antenna-tip" cx="33" cy="8" r="5"/>
        <rect x="20" y="28" width="80" height="62" rx="18" fill="#131a30" stroke="#29f1ff" stroke-width="2"/>
        <circle class="eye left" cx="48" cy="58" r="8"/>
        <circle class="eye right" cx="78" cy="58" r="8"/>
        <path id="robotMouth" d="M50 76 Q63 84 78 76" stroke="#29f1ff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <rect x="10" y="95" width="100" height="10" rx="5" fill="#05060d" stroke="#29f1ff" stroke-width="1.5"/>
      </svg>
      <div class="speech-bubble" id="robotSpeech" aria-live="polite">Inicializando sistemas…</div>
      <div class="robot-caption" id="robotCaption">TRANSMISIÓN ESTABLE</div>
    </div>

    <div class="main-panel bracketed" id="mainPanel" aria-live="polite">
      <span class="bl"></span><span class="br"></span>
      <!-- screens injected here -->
    </div>
  </div>
</div>

<div id="eggToast"></div>
<iframe name="hiddenFormFrame" title="envio-oculto" style="display:none;"></iframe>

<script>
/* ===================== CONCEPTOS BASE (10) ===================== */
// usados para armar distractores de Misión 1 y Misión 2
const CONCEPTS = [
  "Redes de comunicación",
  "Sistema Operativo",
  "Herramienta de productividad",
  "Herramientas de creación de contenido multimedia",
  "Plataformas de creación de contenido",
  "Derechos de autor y licenciamiento",
  "Huella digital",
  "Riesgos en línea",
  "Herramientas generativas",
  "Desafíos de la IA"
];

/* ===================== DATOS ===================== */
const LEVELS = [
  {
    id:0, code:"MISIÓN 1", title:"Descifra el conocimiento", icon:"🛜", mode:"concept",
    badgeName:"Explorador de Redes",
    brief:"Nuestro escáner detectó actividad de SHADOW en los archivos base de la Academia. Antes de avanzar debes demostrar que dominas los conceptos clave del Módulo 2. Selecciona el concepto correcto para cada definición.",
    cinematicAfter:"Excelente. Ya conoces los conceptos básicos. Ahora ingresaremos al Laboratorio de Inteligencia Artificial para la Misión 2.",
    questions:[
      {def:"Conjunto de dispositivos conectados entre sí para compartir información, como el Wi-Fi de tu casa.", correct:"Redes de comunicación", options:["Redes de comunicación","Sistema Operativo","Plataformas de creación de contenido","Riesgos en línea"]},
      {def:"Programa base que administra el hardware y el software de un dispositivo.", correct:"Sistema Operativo", options:["Sistema Operativo","Herramienta de productividad","Huella digital","Herramientas generativas"]},
      {def:"Programa que permite almacenar, organizar y consultar información de forma estructurada, como una base de datos.", correct:"Herramienta de productividad", options:["Herramienta de productividad","Plataformas de creación de contenido","Redes de comunicación","Desafíos de la IA"]},
      {def:"Herramientas que permiten crear videos, imágenes o audio para un proyecto.", correct:"Herramientas de creación de contenido multimedia", options:["Herramientas de creación de contenido multimedia","Sistema Operativo","Derechos de autor y licenciamiento","Riesgos en línea"]},
      {def:"Espacios digitales donde se publica y comparte contenido con otras personas.", correct:"Plataformas de creación de contenido", options:["Plataformas de creación de contenido","Huella digital","Herramientas generativas","Redes de comunicación"]},
      {def:"Normas que protegen la propiedad de una obra y definen cómo puede usarse o compartirse.", correct:"Derechos de autor y licenciamiento", options:["Derechos de autor y licenciamiento","Riesgos en línea","Sistema Operativo","Desafíos de la IA"]},

/* ===================== AUDIO ===================== */
let actx = null;
function ensureAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function tone(freq, startOffset, dur, type='sine', gain=0.16){
  if(!actx) return;
  const t0 = actx.currentTime + startOffset;
  const osc = actx.createOscillator(); const g = actx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(g); g.connect(actx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
function playStart(){ ensureAudio(); [300,500,760,1000].forEach((f,i)=>tone(f,i*0.06,.16,'sawtooth',0.08)); }
function playCorrect(){ ensureAudio(); tone(660,0,.14,'triangle'); tone(880,.1,.22,'triangle'); }
function playWrong(){ ensureAudio(); tone(220,0,.22,'sawtooth',0.12); tone(160,.12,.28,'sawtooth',0.1); }
function playLevelUp(){ ensureAudio(); [523,659,784,1046].forEach((f,i)=>tone(f,i*0.11,.3,'triangle')); }
function playAlert(){ ensureAudio(); tone(180,0,.18,'square',0.1); tone(180,.24,.18,'square',0.1); tone(140,.48,.3,'square',0.12); }
function playEgg(){ ensureAudio(); [784,988,1318].forEach((f,i)=>tone(f,i*0.09,.22,'triangle',0.14)); }
function playApplause(){
  ensureAudio(); if(!actx) return;
  const dur = 1.6; const bufferSize = actx.sampleRate * dur;
  const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1); }
  const src = actx.createBufferSource(); src.buffer = buffer;
  const filter = actx.createBiquadFilter(); filter.type='bandpass'; filter.frequency.value=2200; filter.Q.value=0.7;
  const g = actx.createGain(); g.gain.setValueAtTime(0.0001, actx.currentTime);
  for(let t=0; t<dur; t+=0.05){
    const amp = 0.05 + Math.random()*0.06;
    g.gain.setValueAtTime(0.0001, actx.currentTime+t);
    g.gain.linearRampToValueAtTime(amp, actx.currentTime+t+0.01);
    g.gain.linearRampToValueAtTime(0.0001, actx.currentTime+t+0.045);
  }
  src.connect(filter); filter.connect(g); g.connect(actx.destination);
  src.start(); src.stop(actx.currentTime+dur);
}

/* ===================== MEZCLA ALEATORIA DE OPCIONES ===================== */
let currentView = null;
function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function buildQuestionView(level, q){
  const correctLabel = level.mode === 'case' ? q.options[q.correct] : q.correct;
  const indices = shuffleArray(q.options.map((_,i)=>i));
  const displayOptions = indices.map(i=>q.options[i]);
  const correctIndex = displayOptions.indexOf(correctLabel);
  return { displayOptions, correctIndex, correctLabel };
}

function handleAnswer(choice){
  const level = LEVELS[state.levelIndex];
  const q = level.questions[state.qIndex];
  const correctIndex = currentView.correctIndex;
  const isCorrect = choice === correctIndex;

  document.querySelectorAll('.opt').forEach((btn,i)=>{
    btn.disabled = true;
    if(i === correctIndex) btn.classList.add('correct');
    else if(i === choice) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  const correctLabel = currentView.correctLabel;
  const tipText = level.mode === 'case' ? q.tip : '';
  const fb = document.getElementById('feedbackBox');
  fb.classList.add('show', isCorrect ? 'ok' : 'bad');
  fb.textContent = (isCorrect ? '✔ ¡Correcto! ' : '✘ La respuesta correcta era «'+correctLabel+'». ') + tipText;
  document.getElementById('nextBtn').style.display = 'inline-block';

  state.answeredCount++;

  if(isCorrect){
    state.results[state.levelIndex].correct++;
    state.xp += XP_PER_CORRECT;
    state.streak++;
    playCorrect();
    setRobot('happy', '¡Bien detectado, '+state.name+'! ⭐ +100 XP', 'SEÑAL CONFIRMADA');
    if(state.streak > 0 && state.streak % 3 === 0){
      state.xp += XP_STREAK_BONUS;
      playEgg();
      showEgg();
    }
  } else {
    state.streak = 0;
    state.lives = Math.max(0, state.lives - 1);
    playWrong();
    setRobot('sad', 'Casi. Guarda ese dato para reforzarlo, '+state.name+'.', 'SEÑAL REGISTRADA');
  }
  updateHud(level.code);

  document.getElementById('nextBtn').addEventListener('click', advanceFlow, {once:true});
}

function advanceFlow(){
  if(state.lives <= 0){ renderNoLives(); return; }
  const level = LEVELS[state.levelIndex];
  state.qIndex++;
  if(state.qIndex < level.questions.length){
    if(state.answeredCount === 25){ renderFinalBossIntro(); return; }
    if(state.answeredCount === 5 || state.answeredCount === 15){ renderMiniBoss(); return; }
    renderQuestion();
  } else {
    renderLevelComplete();
  }
}

function renderNoLives(){
  setBossMode(false);
  setRobot('sad', 'No te preocupes. Puedes volver a intentarlo.', 'RECUPERANDO ENERGÍA');
  setPanelHTML(`
    <div class="screen" style="text-align:center;">
      <div class="heartbreak">🖤🖤🖤</div>
      <h1 class="title">Energía agotada</h1>
      <p class="lead" style="margin:0 auto;">IA-9: "No te preocupes, ${state.name}. Puedes volver a intentarlo." Tus vidas se recargarán y la misión continúa.</p>
      <div><button class="btn" id="retryBtn">Reintentar 🔄</button></div>
    </div>
  `);
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    state.lives = 3;
    updateHud(LEVELS[state.levelIndex].code);
    advanceFlow();
  });
}

function renderMiniBoss(){
  setBossMode(true);
  playAlert();
  setRobot('sad', 'Alerta, Agente. SHADOW encontró una vulnerabilidad.', 'INTERFERENCIA DETECTADA');
  setPanelHTML(`
    <div class="screen alert-panel">
      <div class="alert-icon">⚠️</div>
      <div class="alert-title">ALERTA — SHADOW</div>
      <p class="lead" style="margin:0 auto;">SHADOW ha encontrado una vulnerabilidad en el sistema. Responde con cuidado para sellarla.</p>
      <div><button class="btn danger" id="miniBossContinue">Enfrentar ▶</button></div>
    </div>
  `);
  document.getElementById('miniBossContinue').addEventListener('click', renderQuestion);
}

function renderFinalBossIntro(){
  setBossMode(true);
  playAlert();
  setRobot('sad', 'Es SHADOW. Esta es la batalla final, Agente.', 'CONTACTO DIRECTO');
  setPanelHTML(`
    <div class="screen alert-panel">
      <div class="shadow-face">👁️</div>
      <div class="alert-title">SHADOW</div>
      <p class="lead" style="margin:0 auto;">"Para convertirme en dueño de Internet necesito tu ayuda. Debes impedirlo respondiendo correctamente cinco preguntas."</p>
      <div><button class="btn danger" id="finalBossContinue">Aceptar el desafío ▶</button></div>
    </div>
  `);
  document.getElementById('finalBossContinue').addEventListener('click', renderQuestion);
}

function renderLevelComplete(){
  const level = LEVELS[state.levelIndex];
  const r = state.results[state.levelIndex];
  const isLast = state.levelIndex === LEVELS.length - 1;
  setBossMode(false);
  unlockBadge(state.levelIndex);
  playLevelUp();

  if(isLast){
    setRobot('excited', '¡SHADOW ha sido detenido! Insignia desbloqueada: '+level.badgeName, 'AMENAZA NEUTRALIZADA');
    setPanelHTML(`
      <div class="screen" style="text-align:center;">
        <div class="eyebrow">${level.code} completada</div>
        <div class="badge-big">${level.icon}</div>
        <h1 class="title">${level.badgeName}</h1>
        <div class="score-line">Transmisiones correctas: <b>${r.correct} / ${r.total}</b></div>
        <p class="lead" style="margin:12px auto 0;">IA-9: "Lo lograste, ${state.name}. SHADOW ha sido neutralizado y la información mundial está a salvo. Es momento de tu certificado."</p>
        <div><button class="btn" id="continueBtn">Ver certificado ▶</button></div>
      </div>
    `);
  } else {
    setRobot('excited', level.cinematicAfter, 'MISIÓN SUPERADA');
    setPanelHTML(`
      <div class="screen" style="text-align:center;">
        <div class="eyebrow">${level.code} completada</div>
        <div class="badge-big">${level.icon}</div>
        <h1 class="title">${level.badgeName}</h1>
        <div class="score-line">Transmisiones correctas: <b>${r.correct} / ${r.total}</b></div>
        <div><button class="btn" id="continueBtn">Continuar misión ▶</button></div>
      </div>
    `);
  }

  document.getElementById('continueBtn').addEventListener('click', ()=>{
    if(isLast){ renderCertificate(); }
    else { state.levelIndex++; renderLevelIntro(); }
  });
}

function levelStatus(pct){
  if(pct >= 80) return 'Consolidado';
  if(pct >= 50) return 'En desarrollo';
  return 'Inicial';
}

function renderCertificate(){
  setBossMode(false);
  updateHud('MISIÓN COMPLETA');
  playApplause();
  setRobot('excited', '¡Felicidades, '+state.name+'! Aquí está tu certificado de Agente Digital.', 'MISIÓN FINALIZADA');
  const totalCorrect = state.results.reduce((a,r)=>a+r.correct,0);
  const totalPct = Math.round((totalCorrect/TOTAL_Q)*100);
  const today = new Date().toLocaleDateString('es-CR', {year:'numeric', month:'long', day:'numeric'});

  const zoneRows = LEVELS.map((lvl,i)=>{
    const r = state.results[i];
    const pct = Math.round((r.correct/r.total)*100);
    return `<div class="zone-row"><span>${lvl.icon} ${lvl.title}</span><div class="bar-mini"><div style="width:${pct}%;"></div></div><span>${r.correct}/${r.total} · ${levelStatus(pct)}</span></div>`;
  }).join('');

  const reportText = `INFORME DE MISIÓN — AISD
Agente: ${state.name}
Sección: ${state.section}
Fecha: ${today}
Resultado global: ${totalCorrect}/${TOTAL_Q} (${totalPct}%)
XP total: ${state.xp}
` + LEVELS.map((lvl,i)=>{
    const r = state.results[i];
    const pct = Math.round((r.correct/r.total)*100);
    return `- ${lvl.title}: ${r.correct}/${r.total} (${pct}% · ${levelStatus(pct)})`;
  }).join('\n');

  setPanelHTML(`
    <div class="screen">
      <div class="diploma">
        <div class="diploma-seal">🎖️</div>
        <div class="agency">LA AGENCIA INTERNACIONAL DE SEGURIDAD DIGITAL</div>
        <h2>CERTIFICADO</h2>
        <div class="sub">certifica que</div>
        <div class="agent-name">${state.name}</div>
        <div class="sub">Sección ${state.section}</div>
        <div class="sub">ha superado exitosamente la MISIÓN DIGITAL 2090 y obtiene el rango de</div>
        <div class="rank">🛡 AGENTE DIGITAL</div>
        <div class="score-line" style="margin-top:16px;">Resultado global: <b>${totalCorrect}/${TOTAL_Q} (${totalPct}%)</b></div>
        <div class="xp-total">⭐ XP TOTAL: ${state.xp}</div>
        <div class="zone-report">${zoneRows}</div>
        <div id="sendStatus" class="lead" style="margin-top:16px; font-family:var(--font-mono); font-size:13px; max-width:none;">📡 Enviando resultados a la profesora...</div>
      </div>
      <div class="btnrow" style="margin-top:22px;">
        <button class="btn" id="finishBtn">🏆 Finalizar misión</button>
        <button class="btn secondary" id="downloadBtn">Descargar certificado 🖼️</button>
        <button class="btn secondary" id="copyBtn">Copiar informe para la profesora 📋</button>
        <button class="btn secondary" id="resendBtn">Reenviar a la profesora 🔁</button>
        <button class="btn secondary" id="restartBtn">Reiniciar misión ↺</button>
      </div>
      <textarea class="report-copy" id="reportCopy" readonly>${reportText}</textarea>
    </div>
  `);

  const resultsPayload = buildResultsPayload(totalCorrect, totalPct, today);
  sendResultsToTeacher(resultsPayload);
  document.getElementById('resendBtn').addEventListener('click', ()=> sendResultsToTeacher(resultsPayload));

  document.getElementById('finishBtn').addEventListener('click', ()=>{
    const btn = document.getElementById('finishBtn');
    btn.textContent = '¡Misión archivada! ✔';
  });
  document.getElementById('copyBtn').addEventListener('click', ()=>{
    const ta = document.getElementById('reportCopy'); ta.select(); ta.setSelectionRange(0, 99999);
    try{ document.execCommand('copy'); }catch(e){}
    if(navigator.clipboard){ navigator.clipboard.writeText(reportText).catch(()=>{}); }
    const btn = document.getElementById('copyBtn'); const original = btn.textContent;
    btn.textContent = '¡Copiado! ✔'; setTimeout(()=> btn.textContent = original, 1800);
  });
  document.getElementById('downloadBtn').addEventListener('click', ()=> downloadCertificateImage(totalCorrect, totalPct, today));
  document.getElementById('restartBtn').addEventListener('click', resetMission);
}

function downloadCertificateImage(totalCorrect, totalPct, dateStr){
  const c = document.createElement('canvas'); c.width = 1200; c.height = 780;
  const ctx = c.getContext('2d');
  const grd = ctx.createLinearGradient(0,0,1200,780);
  grd.addColorStop(0,'#131a30'); grd.addColorStop(1,'#05060d');
  ctx.fillStyle = grd; ctx.fillRect(0,0,1200,780);

  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 6; ctx.strokeRect(30,30,1140,720);
  ctx.strokeStyle = 'rgba(41,241,255,0.5)'; ctx.lineWidth = 2; ctx.strokeRect(46,46,1108,688);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#7c8fb8'; ctx.font = '600 16px Arial';
  ctx.fillText('LA AGENCIA INTERNACIONAL DE SEGURIDAD DIGITAL', 600, 100);
  ctx.fillStyle = '#ffd166'; ctx.font = '900 42px Arial';
  ctx.fillText('CERTIFICADO', 600, 150);
  ctx.fillStyle = '#7c8fb8'; ctx.font = '400 18px Arial';
  ctx.fillText('certifica que', 600, 190);

  ctx.fillStyle = '#29f1ff'; ctx.font = '700 50px Arial';
  ctx.fillText(state.name, 600, 260);

  ctx.fillStyle = '#7c8fb8'; ctx.font = '400 16px Arial';
  ctx.fillText('Sección ' + state.section, 600, 288);
  ctx.font = '400 18px Arial';
  ctx.fillText('ha superado exitosamente la MISIÓN DIGITAL 2090', 600, 315);
  ctx.fillText('y obtiene el rango de', 600, 340);

  ctx.fillStyle = '#39ff8f'; ctx.font = '900 34px Arial';
  ctx.fillText('AGENTE DIGITAL', 600, 390);

  ctx.fillStyle = '#e9f2ff'; ctx.font = '600 22px Arial';
  ctx.fillText('Resultado global: ' + totalCorrect + '/' + TOTAL_Q + ' (' + totalPct + '%)  ·  XP TOTAL: ' + state.xp, 600, 435);
  ctx.fillStyle = '#7c8fb8'; ctx.font = '400 16px Arial';
  ctx.fillText(dateStr, 600, 462);

  let y = 510;
  LEVELS.forEach((lvl,i)=>{
    const r = state.results[i]; const pct = Math.round((r.correct/r.total)*100);
    ctx.textAlign = 'left'; ctx.fillStyle = '#e9f2ff'; ctx.font = '500 20px Arial';
    ctx.fillText(lvl.icon + '  ' + lvl.title, 130, y);
    ctx.textAlign = 'right'; ctx.fillStyle = '#29f1ff';
    ctx.fillText(r.correct + '/' + r.total + ' · ' + levelStatus(pct), 1070, y);
    y += 46;
  });

  ctx.textAlign = 'center'; ctx.fillStyle = '#7c8fb8'; ctx.font = 'italic 15px Arial';
  ctx.fillText('PNFT · Formación Tecnológica · III Ciclo · Noveno año', 600, 740);

  const link = document.createElement('a');
  link.download = 'certificado_agente_digital_' + state.name.replace(/\s+/g,'_') + '.png';
  link.href = c.toDataURL('image/png'); link.click();
}

function resetMission(){
  state = { name: state.name, section: state.section, levelIndex:0, qIndex:0, answeredCount:0, xp:0, lives:3, streak:0,
    results: LEVELS.map(l => ({correct:0, total:l.questions.length})) };
  document.querySelectorAll('.badge-slot').forEach(b=>b.classList.remove('unlocked'));
  renderLevelIntro();
}

/* ===================== TICKS EN LA BARRA ===================== */
(function buildTicks(){
  const track = document.getElementById('progressFill').parentElement;
  let acc = 0;
  LEVELS.slice(0,-1).forEach(l=>{
    acc += l.questions.length;
    const tick = document.createElement('div');
    tick.className = 'tick'; tick.style.left = (acc/TOTAL_Q*100) + '%';
    track.appendChild(tick);
  });
})();

/* ===================== INICIO ===================== */
updateHud('ACADEMIA — EN ESPERA');
renderIntro();
</script>
</body>
</html>
